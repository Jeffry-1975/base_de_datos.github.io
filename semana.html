<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Detalle de Semana</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#f0e6c8;--brown:#3b2a1a;--mocha:#6b4c2a;
  --rust:#c0522a;--mustard:#c9903a;--ink:#1c1410;
}
body{
  background:var(--ink);font-family:'Courier Prime',monospace;color:var(--cream);min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(192,82,42,.08) 0%,transparent 60%);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.5;
}

/* ── TOPBAR ── */
.topbar{
  background:var(--brown);border-bottom:2px solid var(--mustard);
  padding:0 1.6rem;display:flex;align-items:center;justify-content:space-between;
  min-height:52px;
}
.btn-back{
  background:none;border:1px solid rgba(212,168,68,.35);border-radius:2px;
  color:rgba(240,230,200,.7);font-family:'Special Elite',cursive;font-size:.7rem;
  padding:5px 12px;cursor:pointer;transition:all .2s;text-transform:uppercase; text-decoration:none;
}
.btn-back:hover{border-color:var(--mustard);color:var(--mustard);}
.logged-badge{display:flex;align-items:center;gap:12px;font-family:'Special Elite',cursive;font-size:.7rem;}
.btn-out{background:none;border:none;color:rgba(240,230,200,.3);font-size:.67rem;cursor:pointer;font-family:'Special Elite',cursive;}
.btn-out:hover{color:var(--rust);}

/* ── HEADER SEMANA ── */
.header{padding:2rem 1.6rem;max-width:900px;margin:0 auto;border-bottom:1px solid rgba(212,168,68,.2);}
.week-num{color:var(--mustard);font-family:'Special Elite',cursive;font-size:.8rem;letter-spacing:3px;}
.title-group{display:flex;align-items:center;gap:15px;margin-top:10px;}
.week-title{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--cream);}
.btn-edit{background:none;border:none;color:var(--rust);cursor:pointer;font-size:1rem;display:none;}
.btn-edit:hover{color:var(--mustard);}

/* ── ACCIONES ── */
.actions{max-width:900px;margin:1rem auto;padding:0 1.6rem;display:flex;justify-content:flex-end;}
.btn-action{
  background:linear-gradient(90deg,var(--rust),var(--mocha));
  border:1px solid rgba(212,168,68,.25);border-radius:2px;
  color:var(--cream);font-size:.75rem;padding:8px 16px;cursor:pointer;
  font-family:'Special Elite',cursive;letter-spacing:1.5px;text-transform:uppercase;
  transition:opacity .2s; display:none;
}
.btn-action:hover{opacity:.85;}

/* ── CUADRÍCULA ARCHIVOS ── */
.content{max-width:900px;margin:2rem auto;padding:0 1.6rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;}
.file-card{
  background:rgba(59,42,26,.55);border:1px solid rgba(107,76,42,.38);border-radius:4px;
  padding:1.2rem 1rem;text-align:center;transition:all .2s;position:relative;cursor:pointer;
}
.file-card:hover{border-color:var(--mustard);transform:translateY(-3px);}
.f-icon{font-size:2rem;display:block;margin-bottom:.5rem;}
.f-name{font-size:.75rem;color:rgba(240,230,200,.9);word-break:break-word;margin-bottom:5px;}
.f-badge{font-size:.6rem;color:var(--mustard);font-family:'Special Elite',cursive;padding:2px 5px;border:1px solid var(--mustard);border-radius:2px;}
.btn-del{
  position:absolute;top:5px;right:5px;background:rgba(192,82,42,.2);border:1px solid var(--rust);
  color:#fbb;border-radius:2px;width:22px;height:22px;font-size:.7rem;cursor:pointer;display:none;
}
.btn-del:hover{background:var(--rust);color:#fff;}
.empty{grid-column:1/-1;text-align:center;color:rgba(240,230,200,.3);font-family:'Special Elite',cursive;padding:3rem;}

/* ── MODALES (Upload & Viewer) ── */
.modal{display:none;position:fixed;inset:0;background:rgba(10,8,6,.9);align-items:center;justify-content:center;z-index:300;}
.modal.open{display:flex;}
.mbox{
  background:var(--brown);border:2px solid var(--mustard);border-radius:4px;
  padding:1.8rem;width:min(400px,92vw);position:relative;
}
.mbox h3{font-family:'Playfair Display',serif;color:var(--mustard);margin-bottom:1rem;}
.mbox input[type=text]{
  width:100%;padding:.6rem;background:rgba(28,20,16,.8);border:1px solid rgba(107,76,42,.55);
  color:var(--cream);margin-bottom:1rem;font-family:'Courier Prime',monospace;
}
.dropz{
  border:2px dashed rgba(107,76,42,.5);padding:1.5rem;text-align:center;
  color:rgba(240,230,200,.5);cursor:pointer;margin-bottom:1rem;font-family:'Special Elite',cursive;
}
.dropz input{display:none;}
.btn-grp{display:flex;justify-content:flex-end;gap:10px;}
.btn-sec{background:none;border:1px solid rgba(240,230,200,.3);color:var(--cream);padding:8px 15px;cursor:pointer;font-family:'Special Elite',cursive;}

/* Viewer */
.viewer{display:none;position:fixed;inset:0;background:rgba(10,8,6,.95);z-index:400;flex-direction:column;}
.viewer.open{display:flex;}
.vtop{display:flex;justify-content:space-between;padding:1rem 1.6rem;background:var(--brown);border-bottom:1px solid var(--mustard);}
.vtop span{font-family:'Playfair Display',serif;font-size:1.2rem;}
.iframe-container{flex:1;padding:1rem;}
iframe{width:100%;height:100%;background:#fff;border-radius:4px;border:none;}

/* Loader */
#loader{display:none;color:var(--mustard);font-family:'Special Elite',cursive;text-align:center;margin-top:10px;}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="btn-back">← Volver al Dashboard</a>
  <div class="logged-badge">
    <span id="authStatus">Conectando...</span>
    <button class="btn-out" id="btnLogout" style="display:none;" onclick="window.doLogout()">Salir</button>
  </div>
</div>

<div class="header">
  <div class="week-num" id="wNum">SEMANA --</div>
  <div class="title-group">
    <h1 class="week-title" id="wTitle">Cargando información...</h1>
    <button class="btn-edit" id="btnEditTitle" onclick="editTitle()">✏️</button>
  </div>
</div>

<div class="actions">
  <button class="btn-action" id="btnUpload" onclick="openUploadModal()">+ Subir Material</button>
</div>

<div class="content">
  <div class="grid" id="filesGrid">
    <div class="empty">Cargando archivos...</div>
  </div>
</div>

<!-- Modal Upload -->
<div class="modal" id="uploadModal">
  <div class="mbox">
    <h3>Subir Archivo</h3>
    <input type="text" id="fileTitle" placeholder="Título del archivo (ej. Clase 1)"/>
    <div class="dropz" onclick="document.getElementById('fileIn').click()">
      <span id="dropText">Haz clic para seleccionar archivo</span>
      <input type="file" id="fileIn" onchange="filePicked(this)"/>
    </div>
    <div id="loader">Subiendo a la nube...</div>
    <div class="btn-grp">
      <button class="btn-sec" onclick="closeUploadModal()">Cancelar</button>
      <button class="btn-action" style="display:block" onclick="uploadFile()">Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal Viewer -->
<div class="viewer" id="viewerModal">
  <div class="vtop">
    <span id="vTitle">Visor</span>
    <button class="btn-sec" onclick="closeViewer()">Cerrar</button>
  </div>
  <div class="iframe-container">
    <iframe id="vFrame" src=""></iframe>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

/* =========================================================================
   👇👇👇 PEGA AQUÍ TUS LLAVES DE SUPABASE 👇👇👇
========================================================================= */
const supabaseUrl = 'https://crtyrcabkowrfrwcyidx.supabase.co';
// ¡IMPORTANTE! Reemplaza la siguiente llave por tu llave ANON PÚBLICA (que empieza con eyJ...)
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNydHlyY2Fia293cmZyd2N5aWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTY2OTksImV4cCI6MjA5MTkzMjY5OX0.Vl-aZTTugDXn_mYw8_eUkSGA25K0x_SYlSHGXzjxzTQ'; 

// Configuramos Supabase para que la sesión muera al cerrar la pestaña/ventana (sessionStorage)
const supabase = createClient(supabaseUrl, supabaseKey, {
  auth: {
    storage: window.sessionStorage
  }
});

// 1. Obtener el ID de la semana desde la URL (ej. semana.html?id=3)
const urlParams = new URLSearchParams(window.location.search);
const weekId = parseInt(urlParams.get('id'));

let currentUser = null;
let userRole = 'invitado';

// 2. Verificar Sesión
async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    const { data: profile } = await supabase.from('perfiles').select('rol').eq('id', currentUser.id).single();
    userRole = profile ? profile.rol : 'usuario';
    document.getElementById('authStatus').textContent = `👤 ${currentUser.email.split('@')[0]} (${userRole})`;
    document.getElementById('btnLogout').style.display = 'inline-block';
    
    // Habilitar botones si es admin o usuario general
    if(userRole === 'admin' || userRole === 'usuario'){
      document.getElementById('btnUpload').style.display = 'block';
      if(userRole === 'admin') document.getElementById('btnEditTitle').style.display = 'block';
    }
  } else {
    document.getElementById('authStatus').textContent = "Modo Invitado (Solo lectura)";
    document.getElementById('btnLogout').style.display = 'none';
  }
  loadWeekData();
}

// NUEVO: Función para cerrar sesión desde esta misma página
window.doLogout = async function() {
  await supabase.auth.signOut();
  window.location.reload(); // Recarga la página y te convierte en invitado
};

// 3. Cargar datos de la base de datos
async function loadWeekData() {
  if(!weekId) { document.getElementById('wTitle').textContent = "Error: Semana no especificada"; return; }
  
  document.getElementById('wNum').textContent = `SEMANA ${weekId}`;

  // Buscar Título
  const { data: semData } = await supabase.from('semanas').select('titulo').eq('id', weekId).single();
  if(semData) document.getElementById('wTitle').textContent = semData.titulo;

  // Buscar Archivos
  const { data: files } = await supabase.from('materiales').select('*').eq('semana_id', weekId).order('creado_en', { ascending: false });
  renderFiles(files || []);
}

// 4. Dibujar Archivos en la cuadrícula
function renderFiles(files) {
  const grid = document.getElementById('filesGrid');
  if(files.length === 0) { grid.innerHTML = '<div class="empty">No hay material en esta semana.</div>'; return; }
  
  grid.innerHTML = files.map(f => {
    // Si es pendiente y NO soy admin, no lo muestro
    if (f.estado === 'pendiente' && userRole !== 'admin') return '';
    
    const ext = f.url_o_ruta.split('.').pop().split('?')[0].toLowerCase();
    let icon = '📁';
    if(ext==='pdf') icon='📄'; else if(['jpg','png','jpeg'].includes(ext)) icon='🖼';

    const showDelete = (userRole === 'admin') ? 'style="display:block;"' : '';
    const badge = (f.estado === 'pendiente') ? '<div class="f-badge">Pendiente</div>' : '';

    return `
      <div class="file-card">
        <button class="btn-del" ${showDelete} onclick="deleteFile('${f.id}', '${f.url_o_ruta}')">X</button>
        <div onclick="viewFile('${f.url_o_ruta}', '${f.titulo}')">
          <span class="f-icon">${icon}</span>
          <div class="f-name">${f.titulo}</div>
          ${badge}
        </div>
      </div>
    `;
  }).join('');
}

// 5. Funciones del Visor
window.viewFile = function(url, title) {
  if (url.toLowerCase().includes('.pdf')) {
    document.getElementById('vTitle').textContent = title;
    document.getElementById('vFrame').src = url;
    document.getElementById('viewerModal').classList.add('open');
  } else {
    window.open(url, '_blank');
  }
}
window.closeViewer = function() {
  document.getElementById('viewerModal').classList.remove('open');
  document.getElementById('vFrame').src = '';
}

// 6. Funciones de Edición Admin
window.editTitle = async function() {
  const newTitle = prompt("Nuevo título para la semana:", document.getElementById('wTitle').textContent);
  if(newTitle && newTitle.trim() !== "") {
    const { error } = await supabase.from('semanas').update({ titulo: newTitle }).eq('id', weekId);
    if(!error) document.getElementById('wTitle').textContent = newTitle;
  }
}

window.deleteFile = async function(id, url) {
  if(!confirm("¿Eliminar este archivo?")) return;
  // Borramos de la BD
  await supabase.from('materiales').delete().eq('id', id);
  // (Nota: Idealmente también borraríamos del Storage aquí, pero lo mantendremos simple por ahora)
  loadWeekData();
}

// 7. Subida de Archivos (Supabase Storage)
let selectedFile = null;
window.openUploadModal = () => document.getElementById('uploadModal').classList.add('open');
window.closeUploadModal = () => {
  document.getElementById('uploadModal').classList.remove('open');
  document.getElementById('fileIn').value = '';
  document.getElementById('dropText').textContent = "Haz clic para seleccionar archivo";
  selectedFile = null;
}
window.filePicked = (inp) => {
  if(inp.files[0]) {
    selectedFile = inp.files[0];
    document.getElementById('dropText').textContent = "✦ " + selectedFile.name;
    document.getElementById('fileTitle').value = selectedFile.name.split('.')[0];
  }
}

window.uploadFile = async function() {
  if(!selectedFile) return alert("Selecciona un archivo");
  const title = document.getElementById('fileTitle').value || selectedFile.name;
  
  document.getElementById('loader').style.display = 'block';

  try {
    // 1. Crear nombre único y ruta
    const fileExt = selectedFile.name.split('.').pop();
    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
    const filePath = `semana_${weekId}/${fileName}`;

    // 2. Subir al Storage
    const { data: uploadData, error: uploadError } = await supabase.storage
      .from('archivos_semanas')
      .upload(filePath, selectedFile);
      
    if (uploadError) throw uploadError;

    // 3. Obtener URL pública
    const { data: urlData } = supabase.storage.from('archivos_semanas').getPublicUrl(filePath);

    // 4. Guardar en Base de Datos
    const estadoArchivo = (userRole === 'admin') ? 'aprobado' : 'pendiente';
    const { error: dbError } = await supabase.from('materiales').insert({
      semana_id: weekId,
      titulo: title,
      url_o_ruta: urlData.publicUrl,
      tipo: 'archivo',
      estado: estadoArchivo,
      creado_por: currentUser.id
    });

    if(dbError) throw dbError;

    alert(userRole === 'admin' ? "Subido exitosamente" : "Sugerencia enviada. Esperando aprobación del admin.");
    closeUploadModal();
    loadWeekData();

  } catch (err) {
    alert("Error al subir: " + err.message);
  } finally {
    document.getElementById('loader').style.display = 'none';
  }
}

// Iniciar
checkAuth();
</script>
</body>
</html>
