<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Inspección de Nodo - BD II</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-base: #030305;
  --surface-1: rgba(20, 20, 25, 0.4);
  --surface-2: rgba(30, 30, 40, 0.6);
  --surface-border: rgba(255, 255, 255, 0.08);
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  
  --neon-cyan: #00f0ff;
  --neon-purple: #b537f2;
  --neon-amber: #ff9900;
  --neon-green: #39ff14;
  --neon-red: #ff3366;
}

body{
  background-color: var(--bg-base); font-family: 'Inter', sans-serif;
  color: var(--text-main); min-height: 100vh; overflow-x: hidden;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
  background-size: 30px 30px;
}
body::before, body::after {
  content: ''; position: fixed; width: 600px; height: 600px; border-radius: 50%;
  filter: blur(120px); z-index: -1; pointer-events: none; opacity: 0.15;
}
body::before { top: -100px; left: -100px; background: var(--neon-cyan); }
body::after { bottom: -100px; right: -100px; background: var(--neon-purple); }

/* ── TOPBAR ── */
.topbar{
  background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(12px); border-bottom: 1px solid var(--surface-border);
  padding:0 2rem; display:flex; align-items:center; justify-content:space-between;
  min-height: 60px; gap:1rem; position:relative; z-index: 100;
}
.btn-back-top {
  background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border); border-radius: 20px; 
  color:var(--text-main); font-family:'JetBrains Mono',monospace; font-size:.75rem;
  padding:8px 16px; cursor:pointer; transition:all .2s; text-decoration: none; display: flex; align-items: center; gap: 8px;
}
.btn-back-top:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,240,255,0.2); }

.logged-badge{display:flex;align-items:center;gap:10px; font-family:'JetBrains Mono',monospace; font-size: 0.75rem; color: var(--text-muted);}
.btn-out{background:none;border:none;color:var(--text-muted);font-size:.75rem;cursor:pointer;font-family:'JetBrains Mono',monospace; transition: color 0.2s;}
.btn-out:hover{color: var(--neon-red);}

/* ── HEADER DEL NODO ── */
.header{ padding:3rem 2rem 1.5rem; max-width:1100px; margin:0 auto; border-bottom:1px solid var(--surface-border); position: relative;}
.week-num{color:var(--neon-cyan);font-family:'JetBrains Mono',monospace;font-size:.85rem;letter-spacing:4px; margin-bottom: 10px; display: block;}
.title-group{display:flex;align-items:center;gap:15px;}
.week-title{font-family:'Inter',sans-serif;font-weight:800;font-size:clamp(2rem, 4vw, 3rem);color:var(--text-main); letter-spacing: -1px;}

.btn-edit {
  background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border); color: white;
  border-radius: 50%; width: 32px; height: 32px; display: none; align-items: center; justify-content: center;
  font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.btn-edit:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px rgba(0,240,255,0.5); border-color: var(--neon-cyan); transform: scale(1.1);}
body.admin-mode .btn-edit { display: flex; }

/* ── BARRA DE ACCIONES ── */
.actions{ max-width:1100px; margin:1.5rem auto; padding:0 2rem; display:flex; justify-content:flex-end; }
.btn-action{
  background: var(--text-main); color: var(--bg-base); border: none;
  border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.8rem;
  padding: 10px 20px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; display: none;
}
.btn-action:hover{ transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

/* ── CUADRÍCULA ARCHIVOS (NODOS DE DATOS) ── */
.content{ max-width:1100px; margin:0 auto 4rem; padding:0 2rem; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; }

.file-card{
  background: var(--surface-1); backdrop-filter: blur(10px);
  border: 1px solid var(--surface-border); border-radius: 12px;
  padding: 1.5rem; transition: all 0.3s ease; position: relative; cursor: pointer;
  display: flex; flex-direction: column; align-items: flex-start;
}
.file-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; 
  background: var(--neon-cyan); opacity: 0; transition: opacity 0.3s; border-radius: 12px 0 0 12px;
}
.file-card:hover{ border-color: rgba(0,240,255,0.3); transform:translateY(-4px); background: var(--surface-2); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
.file-card:hover::before { opacity: 1; box-shadow: 0 0 10px var(--neon-cyan); }

.f-icon-wrap {
  width: 45px; height: 45px; background: rgba(0,0,0,0.4); border: 1px solid var(--surface-border);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 1rem;
}
.f-name{font-family: 'Inter', sans-serif; font-weight: 500; font-size:1rem; color:var(--text-main); word-break:break-word; margin-bottom: 8px; line-height: 1.3;}
.f-badge{font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--neon-amber); padding:3px 8px; border:1px solid rgba(255,153,0,0.3); border-radius:4px; background: rgba(255,153,0,0.1); text-transform: uppercase;}

.btn-del{
  position:absolute; top:10px; right:10px; background:rgba(255,51,102,0.1); border:1px solid rgba(255,51,102,0.3);
  color:var(--neon-red); border-radius:6px; width:28px; height:28px; font-size:.8rem; cursor:pointer; display:none;
  align-items: center; justify-content: center; transition: all 0.2s;
}
.btn-del:hover{ background:var(--neon-red); color:#fff; box-shadow: 0 0 10px var(--neon-red); }
body.admin-mode .btn-del { display: flex; }

.empty{ grid-column:1/-1; text-align:center; color:var(--text-muted); font-family:'JetBrains Mono',monospace; padding:4rem 2rem; border: 1px dashed var(--surface-border); border-radius: 12px; background: rgba(0,0,0,0.2);}

/* ── MODALES (Tech Panels) ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items:center;justify-content:center;z-index:300;}
.modal.open{display:flex; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from {opacity: 0; transform: scale(0.95);} to {opacity: 1; transform: scale(1);} }

.mbox{
  background:rgba(15,15,18,0.9); border:1px solid var(--surface-border); border-radius:16px;
  padding:2.5rem; width:min(450px,92vw); position:relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
}
.mbox::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); }
.mbox h3{font-family:'Inter',sans-serif; font-weight: 800; color:var(--text-main); margin-bottom:1.5rem; font-size: 1.4rem;}

.mbox input[type=text]{
  width:100%;padding:12px 15px;background:rgba(0,0,0,0.5); border:1px solid var(--surface-border);border-radius:8px;
  color:var(--text-main);font-size:.9rem;margin-bottom:1rem;outline:none; font-family:'JetBrains Mono',monospace;transition:border-color .2s;
}
.mbox input[type=text]:focus{border-color:var(--neon-cyan); box-shadow: 0 0 8px rgba(0,240,255,0.2);}

.dropz{
  border:2px dashed rgba(255,255,255,0.15); padding:2rem; text-align:center; border-radius: 8px;
  background: rgba(0,0,0,0.2); transition: all 0.2s;
  color:var(--text-muted); cursor:pointer; margin-bottom:1.5rem; font-family:'JetBrains Mono',monospace; font-size: 0.85rem;
}
.dropz:hover { border-color: var(--neon-cyan); background: rgba(0,240,255,0.05); color: var(--neon-cyan); }
.dropz input{display:none;}

.btn-grp{display:flex;justify-content:flex-end;gap:12px;}
.btn-sec{background:rgba(255,255,255,0.05); border:1px solid var(--surface-border); border-radius: 24px; color:var(--text-main); padding:10px 20px; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size: 0.8rem; transition: all 0.2s;}
.btn-sec:hover { background: rgba(255,255,255,0.1); }

/* Viewer */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index:400;flex-direction:column;}
.viewer.open{display:flex; animation: fadeIn 0.3s ease;}
.vtop{display:flex;justify-content:space-between; align-items: center; padding:1rem 2rem; background:rgba(10,10,12,0.8); border-bottom:1px solid var(--surface-border);}
.vtop span{font-family:'Inter',sans-serif; font-weight: 500; font-size:1.1rem; color: var(--text-main);}
.iframe-container{flex:1;padding:1rem 2rem 2rem; display: flex; justify-content: center;}
iframe{width:100%; max-width: 1200px; height:100%; background:#fff; border-radius:8px; border:none; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}

/* Loader Tech */
#loader{display:none;color:var(--neon-cyan);font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:15px; font-size: 0.8rem; animation: pulse 1.5s infinite;}
@keyframes pulse { 0%, 100% {opacity: 1;} 50% {opacity: 0.5;} }

/* Móvil */
@media (max-width: 768px) {
  .topbar { padding: 10px 1rem; }
  .header { padding: 2rem 1rem 1rem; }
  .actions { padding: 0 1rem; justify-content: center; }
  .content { padding: 0 1rem; }
  .vtop, .iframe-container { padding: 1rem; }
}
</style>
</head>
<body>

<div class="topbar">
  <!-- Botón volver al estilo tech -->
  <a href="index.html" class="btn-back-top">← <span class="hide-mobile">Volver al Terminal</span></a>
  <div class="logged-badge">
    <span id="authStatus">Analizando credenciales...</span>
    <button class="btn-out" id="btnLogout" style="display:none;" onclick="window.doLogout()">[Logout]</button>
  </div>
</div>

<div class="header">
  <span class="week-num" id="wNum">NODO --</span>
  <div class="title-group">
    <h1 class="week-title" id="wTitle">Conectando...</h1>
    <button class="btn-edit" id="btnEditTitle" onclick="editTitle()">✏️</button>
  </div>
</div>

<div class="actions">
  <button class="btn-action" id="btnUpload" onclick="openUploadModal()">+ Ingestar Datos</button>
</div>

<div class="content">
  <div class="grid" id="filesGrid">
    <div class="empty">Buscando bloques de datos...</div>
  </div>
</div>

<!-- Modal Upload (Terminal de Ingestión) -->
<div class="modal" id="uploadModal">
  <div class="mbox">
    <h3>Ingestión de Datos</h3>
    <input type="text" id="fileTitle" placeholder="Etiqueta del archivo (ej. Presentación DB)"/>
    <div class="dropz" onclick="document.getElementById('fileIn').click()">
      <span id="dropText">Click para seleccionar paquete de datos</span>
      <input type="file" id="fileIn" onchange="filePicked(this)"/>
    </div>
    <div id="loader">> Transmitiendo paquete al servidor seguro...</div>
    <div class="btn-grp">
      <button class="btn-sec" onclick="closeUploadModal()">Abortar</button>
      <button class="btn-action" id="btnConfirmUpload" style="display:none;" onclick="uploadFile()">Transmitir</button>
    </div>
  </div>
</div>

<!-- Modal Viewer -->
<div class="viewer" id="viewerModal">
  <div class="vtop">
    <span id="vTitle">Visor de Documento</span>
    <button class="btn-sec" onclick="closeViewer()">Cerrar Visor</button>
  </div>
  <div class="iframe-container">
    <iframe id="vFrame" src=""></iframe>
  </div>
</div>

<!-- ========================================== -->
<!-- SCRIPT TIPO MÓDULO CON SUPABASE INTEGRADO  -->
<!-- ========================================== -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
import { supabaseUrl, supabaseKey } from './config.js'; 

const supabase = createClient(supabaseUrl, supabaseKey, { auth: { storage: window.sessionStorage } });

// 1. Obtener el ID del nodo desde la URL (ej. contenido.html?id=3)
const urlParams = new URLSearchParams(window.location.search);
const weekId = parseInt(urlParams.get('id'));

let currentUser = null;
let userRole = 'invitado';

// 2. Verificar Sesión
async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    const { data: profile } = await supabase.from('perfiles').select('rol').eq('id', currentUser.id).single();
    userRole = profile ? profile.rol : 'usuario';
    
    document.getElementById('authStatus').textContent = `USR: ${currentUser.email.split('@')[0]} [${userRole.toUpperCase()}]`;
    document.getElementById('btnLogout').style.display = 'inline-block';
    
    if(userRole === 'admin' || userRole === 'usuario'){
      document.getElementById('btnUpload').style.display = 'block';
      document.getElementById('btnConfirmUpload').style.display = 'block';
      if(userRole === 'admin') {
        document.body.classList.add('admin-mode'); // Activa botones rojos de borrar y lápiz
      }
    }
  } else {
    document.getElementById('authStatus').textContent = "[MODO LECTURA OFFLINE]";
    document.getElementById('btnLogout').style.display = 'none';
  }
  loadWeekData();
}

window.doLogout = async function() {
  await supabase.auth.signOut();
  window.location.reload(); 
};

// 3. Cargar datos de la BD
async function loadWeekData() {
  if(!weekId) { document.getElementById('wTitle').textContent = "ERROR: ID de Nodo ausente."; return; }
  
  const wStr = weekId < 10 ? '0' + weekId : weekId;
  document.getElementById('wNum').textContent = `NODO ${wStr}`;

  // Buscar Título
  const { data: semData } = await supabase.from('semanas').select('titulo').eq('id', weekId).single();
  if(semData) document.getElementById('wTitle').textContent = semData.titulo;

  // Buscar Archivos
  const { data: files } = await supabase.from('materiales').select('*').eq('semana_id', weekId).order('creado_en', { ascending: false });
  renderFiles(files || []);
}

// 4. Dibujar Archivos en la cuadrícula
function renderFiles(files) {
  const grid = document.getElementById('filesGrid');
  if(files.length === 0) { grid.innerHTML = '<div class="empty">El directorio de este nodo está vacío.</div>'; return; }
  
  grid.innerHTML = files.map(f => {
    // Si es pendiente y NO soy admin, se oculta
    if (f.estado === 'pendiente' && userRole !== 'admin') return '';
    
    const ext = f.url_o_ruta.split('.').pop().split('?')[0].toLowerCase();
    let icon = '📁';
    if(ext==='pdf') icon='📄'; else if(['jpg','png','jpeg'].includes(ext)) icon='🖼';

    const badge = (f.estado === 'pendiente') ? '<div class="f-badge">Requiere Aprobación</div>' : '';

    return `
      <div class="file-card" onclick="viewFile('${f.url_o_ruta}', '${f.titulo}')">
        <button class="btn-del" onclick="event.stopPropagation(); deleteFile('${f.id}')">✕</button>
        <div class="f-icon-wrap">${icon}</div>
        <div class="f-name">${f.titulo}</div>
        ${badge}
      </div>
    `;
  }).join('');
}

// 5. Funciones del Visor
window.viewFile = function(url, title) {
  if (url.toLowerCase().includes('.pdf')) {
    document.getElementById('vTitle').textContent = title;
    document.getElementById('vFrame').src = url;
    document.getElementById('viewerModal').classList.add('open');
  } else {
    window.open(url, '_blank');
  }
}
window.closeViewer = function() {
  document.getElementById('viewerModal').classList.remove('open');
  document.getElementById('vFrame').src = '';
}

// 6. Edición (Admin)
window.editTitle = async function() {
  const newTitle = prompt("Nueva etiqueta para el Nodo:", document.getElementById('wTitle').textContent);
  if(newTitle && newTitle.trim() !== "") {
    const { error } = await supabase.from('semanas').update({ titulo: newTitle }).eq('id', weekId);
    if(!error) document.getElementById('wTitle').textContent = newTitle;
  }
}

window.deleteFile = async function(id) {
  if(!confirm("⚠️ ADVERTENCIA: ¿Eliminar este bloque de datos permanentemente?")) return;
  await supabase.from('materiales').delete().eq('id', id);
  loadWeekData();
}

// 7. Subida de Archivos
let selectedFile = null;
window.openUploadModal = () => document.getElementById('uploadModal').classList.add('open');
window.closeUploadModal = () => {
  document.getElementById('uploadModal').classList.remove('open');
  document.getElementById('fileIn').value = '';
  document.getElementById('dropText').textContent = "Click para seleccionar paquete de datos";
  document.getElementById('fileTitle').value = '';
  selectedFile = null;
}
window.filePicked = (inp) => {
  if(inp.files[0]) {
    selectedFile = inp.files[0];
    document.getElementById('dropText').textContent = "> " + selectedFile.name + " [SELECCIONADO]";
    document.getElementById('dropText').style.color = "var(--neon-cyan)";
    document.getElementById('fileTitle').value = selectedFile.name.split('.')[0];
  }
}

window.uploadFile = async function() {
  if(!selectedFile) return alert("Selecciona un archivo primero.");
  const title = document.getElementById('fileTitle').value || selectedFile.name;
  
  document.getElementById('loader').style.display = 'block';
  document.getElementById('btnConfirmUpload').style.display = 'none';

  try {
    const fileExt = selectedFile.name.split('.').pop();
    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
    const filePath = `semana_${weekId}/${fileName}`;

    // 1. Subir Storage
    const { error: uploadError } = await supabase.storage.from('archivos_semanas').upload(filePath, selectedFile);
    if (uploadError) throw uploadError;

    // 2. Obtener URL
    const { data: urlData } = supabase.storage.from('archivos_semanas').getPublicUrl(filePath);

    // 3. Guardar en BD
    const estadoArchivo = (userRole === 'admin') ? 'aprobado' : 'pendiente';
    const { error: dbError } = await supabase.from('materiales').insert({
      semana_id: weekId,
      titulo: title,
      url_o_ruta: urlData.publicUrl,
      tipo: 'archivo',
      estado: estadoArchivo,
      creado_por: currentUser.id
    });

    if(dbError) throw dbError;

    alert(userRole === 'admin' ? "Transmisión exitosa." : "Datos enviados. Esperando validación del Administrador.");
    closeUploadModal();
    loadWeekData();

  } catch (err) {
    alert("Error en transmisión: " + err.message);
  } finally {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('btnConfirmUpload').style.display = 'block';
  }
}

// Iniciar
checkAuth();
</script>
</body>
</html>
